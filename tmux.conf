# =========================================
# 🧠 TMUX CONFIG - MATRIX EDITION (#00FF41)
# =========================================

# ================================
# 🔑 PREFIXO (ergonomia)
# ================================
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# ================================
# ⚡ PERFORMANCE & GERAL
# ================================
set -s escape-time 0
set -g history-limit 50000
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# ================================
# 🎨 ESTILO MATRIX REAL (Cores)
# ================================
# Barra de status transparente
set -g status-style bg=default,fg='#00FF41'

# Cores das bordas dos painéis (splits)
set -g pane-border-style fg='#004411'
set -g pane-active-border-style fg='#00FF41'

# Configuração da barra esquerda/direita
set -g status-left-length 20
set -g status-left "#[fg=#00FF41,bold][#S] "
set -g status-right "#[fg=#00FF41]%Y-%m-%d #[fg=#00FF41,bold]%H:%M "

# Estilo das janelas na barra inferior
setw -g window-status-format "#[fg=#008833]#I:#W"
setw -g window-status-current-format "#[fg=#00FF41,bold,underscore]#I:#W"

# Cor das mensagens de comando (Ex: Config Recarregada)
set -g message-style bg='#00FF41',fg='#000000'

# ================================
# ⌨️ ATALHOS DE NAVEGAÇÃO (Vim style)
# ================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Atalho para recarregar a configuração
bind r source-file ~/.tmux.conf \; display "Config Recarregada!"

# Garante que o cursor em bloco pisque (Estética Alacritty)
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'
