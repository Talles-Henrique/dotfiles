# =========================================

# 🧠 TMUX CONFIG - i3 + Alacritty + Vim Flow

# Estilo: Hacker clean, produtivo e leve

# =========================================

# ================================

# 🔑 PREFIXO (ergonomia)

# ================================

# Troca Ctrl+b (padrão) por Ctrl+a (mais rápido e comum em setups power user)

unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# ================================

# ⚡ PERFORMANCE

# ================================

# Remove delay ao sair do modo esc/vi

set -sg escape-time 0

# Aumenta histórico de scroll (logs e terminal)

set -g history-limit 10000

# ================================

# 🖱️ MOUSE

# ================================

# Permite scroll, resize e clique (útil em i3 + multitarefa)

set -g mouse on

# ================================

# 🎨 TERMINAL + TRUE COLOR

# ================================

# Necessário para Neovim moderno e temas bonitos

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Bordas de pane (visual limpo estilo dark theme)

set -g pane-border-style fg=#444444
set -g pane-active-border-style fg=#89b4fa

# ================================

# 🔄 RELOAD CONFIG

# ================================

# Recarrega config sem reiniciar tmux

bind r source-file ~/.tmux.conf ; display "tmux recarregado"

# ================================

# 🧭 NAVEGAÇÃO (i3 + Vim feel)

# ================================

# Navegação entre painéis com hjkl (com prefixo)

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navegação sem prefixo (fluxo rápido tipo i3)

bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ================================

# 🧱 SPLITS (workflow principal)

# ================================

# Split vertical (lado a lado)

bind v split-window -h

# Split horizontal (topo/baixo)

bind s split-window -v

# Fecha painel atual

bind x kill-pane

# ================================

# 📂 NOVAS JANELAS SEM PERDER CONTEXTO

# ================================

# Mantém diretório atual ao abrir novos panes/janelas

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ================================

# 📏 RESIZE (segurado)

# ================================

# Ajuste rápido de layout estilo IDE

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ================================

# 📋 COPY MODE (estilo Vim)

# ================================

# Ativa comandos estilo Vim dentro do modo de cópia

setw -g mode-keys vi

# Seleção com "v"

bind-key -T copy-mode-vi v send -X begin-selection

# Copiar com "y"

bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# ================================

# 🧠 INDEX MAIS NATURAL

# ================================

# Começa contagem em 1 (mais humano)

set -g base-index 1
setw -g pane-base-index 1

# ================================

# 🚀 WORKFLOW - SESSÃO DEV

# ================================

# Cria ambiente padrão com 3 panes (tipo mini IDE)

bind-key d new-session -s dev ;
split-window -h ;
split-window -v ;
select-pane -t 0

# ================================

# 🎨 STATUS BAR - HACKER CLEAN (TRANSPARENTE)

# ================================

# Ativa status bar

set -g status on

# Atualiza a cada 1 segundo

set -g status-interval 1

# Posiciona na parte inferior

set -g status-position bottom

# Transparente (usa fundo do Alacritty)

set -g status-style bg=default,fg=#cdd6f4

# ========================

# ESQUERDA (sessão atual)

# ========================

set -g status-left "#[fg=#89b4fa,bold]   #S "

# ========================

# CENTRO (janelas)

# ========================

set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "
set -g window-status-format "#[fg=#6c7086] #I:#W "
set -g window-status-separator ""

# ========================

# DIREITA (info do sistema)

# ========================

set -g status-right "#[fg=#a6e3a1]  %H:%M #[fg=#f9e2af]  %d/%m #[fg=#89b4fa] #H "

# ================================

# 🧠 NOTAS IMPORTANTES

# ================================

#    → requer Nerd Font (JetBrainsMono Nerd Font recomendado)

# Transparência depende do Alacritty, não do tmux

# Ctrl+a = prefixo principal

# Ctrl+a + r = recarregar config

# Ctrl+h/j/k/l = navegação estilo i3

# =========================================

